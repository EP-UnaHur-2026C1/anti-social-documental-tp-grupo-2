services:
  mongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin1234
    ports:
      - 27017:27017
    volumes:
      - ./mongo_data:/data/db # Volumen persistente fuera del contenedor
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5


  mongo-express:
    image: mongo-express
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin1234@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"

  redis:
    image: redis:alpine
    ports:
      - 6379:6379
    volumes:
      - ./redis_data:/data # Para que la caché no se pierda al apagar el contenedor
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  api:
    build: ./
    command: sh -c "npm install -g nodemon && nodemon src/main.js"
    ports: 
      - 4001:3005
    env_file: .env
    environment:
      PORT: 3005
      MONGO_URL: mongodb://admin:admin1234@mongodb:27017/myapp?authSource=admin
      REDIS_URL: redis://redis:6379
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped